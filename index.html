<!DOCTYPE html>
<html>
<head>
  <title>Drive Files</title>
</head>
<body>
  <h2>My Drive Files</h2>

  <ul id="list">Loading...</ul>

  <script>
    async function loadFiles() {
      try {
        // ✅ PUT YOUR REAL VERCEL URL HERE
        const res = await fetch("https://drive-api-git-main-shivamwallah.vercel.app/api/files");

        if (!res.ok) {
          throw new Error("HTTP error " + res.status);
        }

        const data = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(file => {
          const li = document.createElement("li");

          // 📂 show folder icon
          if (file.mimeType === "application/vnd.google-apps.folder") {
            li.textContent = "📂 " + file.name;
          } else {
            li.textContent = "📄 " + file.name;
          }

          list.appendChild(li);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("list").innerHTML =
          "❌ Error: " + err.message;
      }
    }

    loadFiles();
  </script>
</body>
</html>
