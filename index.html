<!DOCTYPE html>
<html>
<head>
  <title>Drive Explorer</title>
</head>
<body>
  <h2>Drive Explorer</h2>

  <button onclick="goBack()">⬅ Back</button>

  <ul id="list">Loading...</ul>

  <script>
    const API_URL = "https://drive-api-git-main-shivamwallah.vercel.app/api/files";

    let historyStack = [];

    async function loadFiles(folderId = "1YITLhxtuu8mh4HlBGEe8XlIp-XuctbCq") {
      try {
        const res = await fetch(API_URL + "?folderId=" + folderId);
        const data = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(file => {
          const li = document.createElement("li");

          // 📂 Folder
          if (file.mimeType === "application/vnd.google-apps.folder") {
            li.textContent = "📂 " + file.name;
            li.style.cursor = "pointer";

            li.onclick = () => {
              historyStack.push(folderId);
              loadFiles(file.id);
            };
          }
          // 📄 File
          else {
            li.textContent = "📄 " + file.name;
          }

          list.appendChild(li);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("list").innerHTML = "Error loading files";
      }
    }

    function goBack() {
      if (historyStack.length > 0) {
        const prev = historyStack.pop();
        loadFiles(prev);
      }
    }

    // ✅ initial load
    loadFiles();
  </script>
</body>
</html>
