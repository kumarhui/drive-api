<!DOCTYPE html>
<html>
<head>
  <title>Drive Files</title>
</head>
<body>
  <h2>My Drive Files</h2>

  <ul id="list">Loading...</ul>

  <script>
    async function loadFiles() {
      try {
        const res = await fetch("https://YOUR_VERCEL_URL/api/files");

        const data = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(file => {
          const li = document.createElement("li");
          li.textContent = file.name + " (" + file.mimeType + ")";
          list.appendChild(li);
        });

      } catch (err) {
        document.getElementById("list").innerHTML = "Error loading files";
        console.error(err);
      }
    }

    // ✅ Auto load on page open
    loadFiles();
  </script>
</body>
</html>
